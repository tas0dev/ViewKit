[package]
name = "viewkit"
description = "A UI kit for mochiOS / Kagami"
keywords = ["uikit", "mochios", "viewkit", "ui", "kagami"]
categories = ["gui"]

version = "0.1.0"
edition = "2024"
autoexamples = false

[dependencies]
swiftlib = { path = "../../user", features = ["std-support"] }

[lib]
name = "viewkit"
path = "src/lib.rs"

[[bin]]
name = "ui_test"
path = "examples/ui_test.rs"

[profile.release]
panic = "abort"

[profile.dev]
panic = "abort"
